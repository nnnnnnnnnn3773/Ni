name: FEXCore Standalone Nightlies

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit hash, branch, or tag to build (leave blank for latest HEAD)'
        required: false
        default: ''
      version_label:
        description: 'Override version label in profile.json (leave blank to auto-detect from git describe)'
        required: false
        default: ''

jobs:
  # ==================================================================
  # JOB 1: FEXCore Build
  # ==================================================================
  build-fex:
    name: Build FEXCore
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}
      commit_full: ${{ steps.version.outputs.commit_full }}
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl xz-utils jq git zip \
            build-essential python3 pkg-config cmake zstd \
            dos2unix perl tar unzip meson ninja-build wget

      - name: Setup GLSLANG
        run: |
          wget -q https://github.com/KhronosGroup/glslang/releases/download/master-tot/glslang-master-linux-Release.zip
          unzip -q glslang-master-linux-Release.zip -d glslang
          echo "$PWD/glslang/bin" >> $GITHUB_PATH

      - name: Setup Toolchain
        run: |
          LLVM_MINGW_TAG="20251104"
          TOOLCHAIN_DIR="/opt/llvm-mingw"
          wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/$LLVM_MINGW_TAG/llvm-mingw-$LLVM_MINGW_TAG-ucrt-ubuntu-22.04-x86_64.tar.xz" -O llvm.tar.xz
          sudo rm -rf "$TOOLCHAIN_DIR" && sudo mkdir -p "$TOOLCHAIN_DIR"
          sudo tar -C "$TOOLCHAIN_DIR" --strip-components=1 -xJf llvm.tar.xz
          echo "$TOOLCHAIN_DIR/bin" >> $GITHUB_PATH

      - name: Clone and checkout target commit
        run: |
          git clone --recursive https://github.com/FEX-Emu/FEX.git source
          cd source

          TARGET_COMMIT="${{ github.event.inputs.commit }}"
          if [ -n "$TARGET_COMMIT" ]; then
            echo "Checking out specified commit/ref: $TARGET_COMMIT"
            git fetch --all --tags
            git checkout "$TARGET_COMMIT"
            # Update submodules after checkout
            git submodule update --init --recursive
          else
            echo "No commit specified — building latest HEAD"
          fi

      - name: Determine version label
        id: version
        run: |
          cd source

          COMMIT_FULL=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)

          # Auto-detect version from git: prefer exact tag, fall back to describe
          GIT_TAG=$(git tag --points-at HEAD | grep -E '^FEX-' | sort -V | tail -1 || true)
          if [ -z "$GIT_TAG" ]; then
            GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "FEX-Unknown")
          fi

          # Use user-supplied label if given, otherwise build one
          CUSTOM_LABEL="${{ github.event.inputs.version_label }}"
          if [ -n "$CUSTOM_LABEL" ]; then
            VERSION_NAME="${CUSTOM_LABEL}"
          else
            VERSION_NAME="${GIT_TAG}-Nightly-${COMMIT_SHORT}"
          fi

          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "version=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "commit_full=${COMMIT_FULL}" >> $GITHUB_OUTPUT

          echo "Building: $VERSION_NAME (full: $COMMIT_FULL)"

      - name: Build FEX
        run: |
          cd source

          build_arch() {
            local triple="$1"
            local dest="$2"
            local build_dir="build-${triple}"

            rm -rf "$build_dir" && mkdir "$build_dir" && cd "$build_dir"
            cmake -G Ninja -Wno-dev \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE=../Data/CMake/toolchain_mingw.cmake \
              -DMINGW_TRIPLE="${triple}-w64-mingw32" \
              -DCMAKE_INSTALL_PREFIX=/usr \
              -DCMAKE_INSTALL_LIBDIR=/usr/lib/wine/aarch64-windows \
              -DENABLE_JEMALLOC_GLIBC_ALLOC=False \
              -DENABLE_LTO=False -DENABLE_ASSERTIONS=False -DBUILD_TESTING=False \
              ..
            ninja -j 2
            DESTDIR="$dest" ninja install
            cd ..
          }

          build_arch "arm64ec" "../../stage-ec"
          build_arch "aarch64" "../../stage-wo"

      - name: Package
        run: |
          rm -rf final_package && mkdir -p final_package/system32

          DLL_EC=$(find stage-ec -type f -name '*.dll' | head -n 1)
          DLL_WOW=$(find stage-wo -type f -name '*.dll' | head -n 1)

          cp "$DLL_EC" final_package/system32/libarm64ecfex.dll
          cp "$DLL_WOW" final_package/system32/libwow64fex.dll
          /opt/llvm-mingw/bin/llvm-strip --strip-all final_package/system32/*.dll

          cat > final_package/profile.json << EOF
          {
            "type": "FEXCore",
            "versionName": "${{ env.VERSION_NAME }}",
            "versionCode": ${{ github.run_number }},
            "description": "FEXCore Nightly\n${{ env.VERSION_NAME }}",
            "author": "FEX-Emu",
            "files": [
              { "source": "system32/libarm64ecfex.dll", "target": "\${system32}/libarm64ecfex.dll" },
              { "source": "system32/libwow64fex.dll", "target": "\${system32}/libwow64fex.dll" }
            ]
          }
          EOF

          cd final_package

          tar -cJf ../${{ env.VERSION_NAME }}.wcp .
          zip -r ../${{ env.VERSION_NAME }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: fex-nightly
          path: |
            *.wcp
            *.zip

  # ==================================================================
  # JOB 2: Release
  # ==================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-fex]
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Set Release Variables
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          READABLE_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          echo "TAG_NAME=fexcore-nightly-$TIMESTAMP" >> $GITHUB_ENV
          echo "RELEASE_NAME=FEXCore Nightly Build - $READABLE_DATE" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: false
          make_latest: true
          body: |
            ### FEXCore Build: ${{ needs.build-fex.outputs.version }}

            | Property | Value |
            | :--- | :--- |
            | **Version** | `${{ needs.build-fex.outputs.version }}` |
            | **Commit (short)** | [`${{ needs.build-fex.outputs.commit }}`](https://github.com/FEX-Emu/FEX/commit/${{ needs.build-fex.outputs.commit_full }}) |
            | **Commit (full)** | `${{ needs.build-fex.outputs.commit_full }}` |
            | **Source input** | `${{ github.event.inputs.commit || 'latest HEAD' }}` |

            ### Files Included
            - `*.wcp` — packaged for Winlator
            - `*.zip` — for manual injection with GameHub
          files: |
            ./artifacts/*.wcp
            ./artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
