name: Upstream Commit Watcher

on:
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 past every hour
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write # Needed to commit the updated hashes file back to the repo
  actions: write  # Needed to trigger the main workflow

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Upstream Repositories
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Repos and matching friendly names (must stay in the same order)
          REPOS=(
            "https://github.com/ptitSeb/box64"
            "https://github.com/Pipetto-crypto/box64"
            "https://github.com/FEX-Emu/FEX"
            "https://github.com/HansKristian-Work/vkd3d-proton"
            "https://github.com/doitsujin/dxvk"
            "https://github.com/jp7677/dxvk-nvapi"
          )
          NAMES=(
            "Box64 (Official)"
            "Box64 (Hybrid/Pipetto)"
            "FEX"
            "VKD3D-Proton"
            "DXVK"
            "DXVK-NVAPI"
          )

          HASH_FILE="upstream_hashes.txt"
          touch $HASH_FILE

          NEW_HASHES=""
          CHANGED_JSON="[]"
          ANY_CHANGED=false

          echo "Checking latest commits..."
          for i in "${!REPOS[@]}"; do
            repo="${REPOS[$i]}"
            name="${NAMES[$i]}"
            REPO_PATH="${repo#https://github.com/}"

            HASH=$(git ls-remote "$repo" HEAD | awk '{print $1}')
            OLD_HASH=$(grep "^${repo}:" "$HASH_FILE" 2>/dev/null | awk '{print $2}')
            SHORT_HASH="${HASH:0:7}"
            SHORT_OLD="${OLD_HASH:0:7}"

            # Fetch latest commit message + date from GitHub API
            COMMIT_INFO=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO_PATH}/commits/${HASH}")
            MSG=$(echo "$COMMIT_INFO" | jq -r '.commit.message // "N/A"' | head -1 | cut -c1-80)
            DATE=$(echo "$COMMIT_INFO" | jq -r '.commit.committer.date // "unknown"')

            # If this repo changed, add it to the changed array
            if [ -n "$OLD_HASH" ] && [ "$HASH" != "$OLD_HASH" ]; then
              ANY_CHANGED=true
              CHANGED_JSON=$(echo "$CHANGED_JSON" | jq \
                --arg repo  "$REPO_PATH" \
                --arg name  "$name" \
                --arg old   "$SHORT_OLD" \
                --arg new   "$SHORT_HASH" \
                --arg full  "$HASH" \
                --arg msg   "$MSG" \
                --arg date  "$DATE" \
                '. + [{"repo":$repo,"name":$name,"old":$old,"new":$new,"full":$full,"msg":$msg,"date":$date}]')
            fi

            NEW_HASHES="${NEW_HASHES}${repo}: ${HASH}\n"
          done

          echo -e "$NEW_HASHES" > new_hashes.txt

          if cmp -s "$HASH_FILE" new_hashes.txt; then
            echo "No new commits detected in upstream repositories."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "New commits detected!"
            mv new_hashes.txt "$HASH_FILE"

            # Write the changes JSON so the build workflow can embed it in the release notes
            jq -n \
              --argjson changed "$CHANGED_JSON" \
              --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{"triggered_at":$ts,"changed":$changed}' > upstream_changes.json

            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit Updated Hashes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream_hashes.txt upstream_changes.json
          git commit -m "chore: auto-update upstream commit hashes"
          git push

      - name: Trigger Main Build Workflow
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "new-All-in-one-nightly+zips-latest-stable.yml"
