name: Upstream Commit Watcher

on:
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 past every hour
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write # Needed to commit the updated hashes file back to the repo
  actions: write  # Needed to trigger the main workflow

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Upstream Repositories
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── Repos tracked for the all-in-one nightly (must stay in same order) ──
          REPOS=(
            "https://github.com/ptitSeb/box64"
            "https://github.com/Pipetto-crypto/box64"
            "https://github.com/FEX-Emu/FEX"
            "https://github.com/HansKristian-Work/vkd3d-proton"
            "https://github.com/doitsujin/dxvk"
          )
          NAMES=(
            "Box64 (Official)"
            "Box64 (Hybrid/Pipetto)"
            "FEX"
            "VKD3D-Proton"
            "DXVK"
          )

          HASH_FILE="upstream_hashes.txt"
          touch $HASH_FILE

          NEW_HASHES=""
          CHANGED_JSON="[]"
          ANY_CHANGED=false

          echo "Checking all-in-one upstream repos..."
          for i in "${!REPOS[@]}"; do
            repo="${REPOS[$i]}"
            name="${NAMES[$i]}"
            REPO_PATH="${repo#https://github.com/}"

            HASH=$(git ls-remote "$repo" HEAD | awk '{print $1}')
            OLD_HASH=$(grep "^${repo}:" "$HASH_FILE" 2>/dev/null | awk '{print $2}')
            SHORT_HASH="${HASH:0:7}"
            SHORT_OLD="${OLD_HASH:0:7}"

            COMMIT_INFO=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO_PATH}/commits/${HASH}")
            MSG=$(echo "$COMMIT_INFO" | jq -r '.commit.message // "N/A"' | head -1 | cut -c1-80)
            DATE=$(echo "$COMMIT_INFO" | jq -r '.commit.committer.date // "unknown"')

            if [ -n "$OLD_HASH" ] && [ "$HASH" != "$OLD_HASH" ]; then
              ANY_CHANGED=true
              CHANGED_JSON=$(echo "$CHANGED_JSON" | jq \
                --arg repo  "$REPO_PATH" \
                --arg name  "$name" \
                --arg old   "$SHORT_OLD" \
                --arg new   "$SHORT_HASH" \
                --arg full  "$HASH" \
                --arg msg   "$MSG" \
                --arg date  "$DATE" \
                '. + [{"repo":$repo,"name":$name,"old":$old,"new":$new,"full":$full,"msg":$msg,"date":$date}]')
            fi

            NEW_HASHES="${NEW_HASHES}${repo}: ${HASH}\n"
          done

          # ── Wine bleeding-edge — tracked separately for the Proton nightly ──
          WINE_REPO="https://github.com/ValveSoftware/wine"
          WINE_KEY="${WINE_REPO}@bleeding-edge"
          WINE_HASH=$(git ls-remote "$WINE_REPO" refs/heads/bleeding-edge | awk '{print $1}')
          WINE_OLD=$(grep "^${WINE_KEY}:" "$HASH_FILE" 2>/dev/null | awk '{print $2}')
          WINE_CHANGED=false

          if [ -n "$WINE_HASH" ]; then
            if [ -n "$WINE_OLD" ] && [ "$WINE_HASH" != "$WINE_OLD" ]; then
              WINE_CHANGED=true
              echo "Wine bleeding-edge changed: ${WINE_OLD:0:7} → ${WINE_HASH:0:7}"
            elif [ -z "$WINE_OLD" ]; then
              echo "Wine bleeding-edge first seen: ${WINE_HASH:0:7} (recording, no build triggered)"
            fi
            NEW_HASHES="${NEW_HASHES}${WINE_KEY}: ${WINE_HASH}\n"
          else
            echo "WARNING: could not fetch ValveSoftware/wine bleeding-edge HEAD"
            # preserve existing hash so we don't falsely trigger
            OLD_WINE_LINE=$(grep "^${WINE_KEY}:" "$HASH_FILE" 2>/dev/null || true)
            [ -n "$OLD_WINE_LINE" ] && NEW_HASHES="${NEW_HASHES}${OLD_WINE_LINE#*: }\n" || true
          fi

          # ── Driver mirror sources ──
          # Release-based: kimchi, stevenmxz, white — track latest release tag
          # Directory-based: mtr — track HEAD commit of main

          KIMCHI_KEY="https://github.com/K11MCH1/AdrenoToolsDrivers@latest-release"
          SMXZ_KEY="https://github.com/StevenMXZ/Adreno-Tools-Drivers@latest-release"
          WHITE_KEY="https://github.com/whitebelyash/freedreno_turnip-CI@latest-release"
          MTR_KEY="https://github.com/maxjivi05/Components@main"

          KIMCHI_TAG=$(gh api repos/K11MCH1/AdrenoToolsDrivers/releases/latest -q '.tag_name' 2>/dev/null || echo "")
          SMXZ_TAG=$(gh api repos/StevenMXZ/Adreno-Tools-Drivers/releases/latest -q '.tag_name' 2>/dev/null || echo "")
          WHITE_TAG=$(gh api repos/whitebelyash/freedreno_turnip-CI/releases/latest -q '.tag_name' 2>/dev/null || echo "")
          MTR_HASH=$(git ls-remote "https://github.com/maxjivi05/Components" HEAD | awk '{print $1}')

          OLD_KIMCHI=$(grep "^${KIMCHI_KEY}:" "$HASH_FILE" 2>/dev/null | awk '{print $2}')
          OLD_SMXZ=$(grep "^${SMXZ_KEY}:" "$HASH_FILE" 2>/dev/null | awk '{print $2}')
          OLD_WHITE=$(grep "^${WHITE_KEY}:" "$HASH_FILE" 2>/dev/null | awk '{print $2}')
          OLD_MTR=$(grep "^${MTR_KEY}:" "$HASH_FILE" 2>/dev/null | awk '{print $2}')

          KIMCHI_CHANGED=false
          SMXZ_CHANGED=false
          WHITE_CHANGED=false
          MTR_CHANGED=false

          if [ -n "$KIMCHI_TAG" ]; then
            [ -n "$OLD_KIMCHI" ] && [ "$KIMCHI_TAG" != "$OLD_KIMCHI" ] && KIMCHI_CHANGED=true && echo "K11MCH1 new release: $OLD_KIMCHI → $KIMCHI_TAG"
            NEW_HASHES="${NEW_HASHES}${KIMCHI_KEY}: ${KIMCHI_TAG}\n"
          else
            [ -n "$OLD_KIMCHI" ] && NEW_HASHES="${NEW_HASHES}${KIMCHI_KEY}: ${OLD_KIMCHI}\n" || true
          fi

          if [ -n "$SMXZ_TAG" ]; then
            [ -n "$OLD_SMXZ" ] && [ "$SMXZ_TAG" != "$OLD_SMXZ" ] && SMXZ_CHANGED=true && echo "StevenMXZ new release: $OLD_SMXZ → $SMXZ_TAG"
            NEW_HASHES="${NEW_HASHES}${SMXZ_KEY}: ${SMXZ_TAG}\n"
          else
            [ -n "$OLD_SMXZ" ] && NEW_HASHES="${NEW_HASHES}${SMXZ_KEY}: ${OLD_SMXZ}\n" || true
          fi

          if [ -n "$WHITE_TAG" ]; then
            [ -n "$OLD_WHITE" ] && [ "$WHITE_TAG" != "$OLD_WHITE" ] && WHITE_CHANGED=true && echo "whitebelyash new release: $OLD_WHITE → $WHITE_TAG"
            NEW_HASHES="${NEW_HASHES}${WHITE_KEY}: ${WHITE_TAG}\n"
          else
            [ -n "$OLD_WHITE" ] && NEW_HASHES="${NEW_HASHES}${WHITE_KEY}: ${OLD_WHITE}\n" || true
          fi

          if [ -n "$MTR_HASH" ]; then
            [ -n "$OLD_MTR" ] && [ "$MTR_HASH" != "$OLD_MTR" ] && MTR_CHANGED=true && echo "maxjivi05/Components changed: ${OLD_MTR:0:7} → ${MTR_HASH:0:7}"
            NEW_HASHES="${NEW_HASHES}${MTR_KEY}: ${MTR_HASH}\n"
          else
            [ -n "$OLD_MTR" ] && NEW_HASHES="${NEW_HASHES}${MTR_KEY}: ${OLD_MTR}\n" || true
          fi

          # ── Write combined hash file ──
          printf '%b' "$NEW_HASHES" > new_hashes.txt

          ANYTHING_CHANGED=false
          if ! cmp -s "$HASH_FILE" new_hashes.txt; then
            ANYTHING_CHANGED=true
            mv new_hashes.txt "$HASH_FILE"
          fi

          if [ "$ANY_CHANGED" = "true" ]; then
            jq -n \
              --argjson changed "$CHANGED_JSON" \
              --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{"triggered_at":$ts,"changed":$changed}' > upstream_changes.json
          fi

          echo "changed=$ANY_CHANGED"             >> $GITHUB_OUTPUT
          echo "wine_changed=$WINE_CHANGED"       >> $GITHUB_OUTPUT
          echo "kimchi_changed=$KIMCHI_CHANGED"   >> $GITHUB_OUTPUT
          echo "smxz_changed=$SMXZ_CHANGED"       >> $GITHUB_OUTPUT
          echo "white_changed=$WHITE_CHANGED"     >> $GITHUB_OUTPUT
          echo "mtr_changed=$MTR_CHANGED"         >> $GITHUB_OUTPUT
          echo "anything_changed=$ANYTHING_CHANGED" >> $GITHUB_OUTPUT

      - name: Commit Updated Hashes
        if: steps.check.outputs.anything_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream_hashes.txt
          [ -f upstream_changes.json ] && git add upstream_changes.json || true
          git diff --staged --quiet || git commit -m "chore: auto-update upstream commit hashes"
          git push

      - name: Trigger All-in-One Nightly
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "new-All-in-one-nightly+zips-latest-stable.yml"

      - name: Trigger Proton Bleeding-Edge Nightly
        if: steps.check.outputs.wine_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "proton-bleeding-edge-nightly.yml"

      - name: Trigger Kimchi Driver Mirror
        if: steps.check.outputs.kimchi_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "kimchi-driver-mirror.yml"

      - name: Trigger StevenMXZ Driver Mirror
        if: steps.check.outputs.smxz_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "stevenmxz-driver-mirror.yml"

      - name: Trigger White Driver Mirror
        if: steps.check.outputs.white_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "white-driver-mirror.yml"

      - name: Trigger MTR Driver Mirror
        if: steps.check.outputs.mtr_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "mtr-driver-mirror.yml"
