name: Proton Bleeding-Edge Nightly

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      wine_ref:
        description: 'Valve Wine ref (branch/tag/commit)'
        required: false
        default: 'bleeding-edge'
        type: string
      gamenative_ref:
        description: 'GameNative proton-wine ref (branch/tag/commit)'
        required: false
        default: 'proton_10.0'
        type: string
      target_app_id:
        description: 'Target Android app id for hardcoded Wine paths'
        required: false
        default: 'app.gamenative'
        type: choice
        options:
          - app.gamenative
          - com.winlator.cmod
      force_build:
        description: 'Force a build even if upstream HEAD is unchanged'
        required: false
        default: false
        type: boolean

jobs:
  # ============================================================
  # JOB 0: Sync proton-scripts/ from Pepelespooder if changed
  # ============================================================
  sync-scripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      scripts_hash: ${{ steps.hash.outputs.scripts_hash }}
    steps:
      - name: Checkout Nightlies repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync proton-scripts/ from Pepelespooder/proton-arm64-nightlies
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM="Pepelespooder/proton-arm64-nightlies"
          LOCAL="proton-scripts"
          CHANGED=false

          sync_file() {
            local remote_path="$1"
            local local_path="$LOCAL/$remote_path"
            mkdir -p "$(dirname "$local_path")"
            NEW_CONTENT=$(gh api "repos/$UPSTREAM/contents/$remote_path" --jq '.content' 2>/dev/null | base64 -d) || {
              echo "WARNING: could not fetch $remote_path — keeping local copy"
              return
            }
            if [ ! -f "$local_path" ] || [ "$NEW_CONTENT" != "$(cat "$local_path")" ]; then
              printf '%s' "$NEW_CONTENT" > "$local_path"
              echo "updated: $local_path"
              CHANGED=true
            fi
          }

          # --- scripts/ ---
          while IFS= read -r name; do
            sync_file "scripts/$name"
          done < <(gh api "repos/$UPSTREAM/contents/scripts" --jq '.[].name')

          # --- ge-second-pass/ subdirs ---
          for subdir in test-bylaws focus keyboard mouse performance; do
            while IFS= read -r name; do
              sync_file "ge-second-pass/$subdir/$name"
            done < <(gh api "repos/$UPSTREAM/contents/ge-second-pass/$subdir" --jq '.[].name' 2>/dev/null)
          done

          # --- patches/ ---
          while IFS= read -r name; do
            sync_file "patches/$name"
          done < <(gh api "repos/$UPSTREAM/contents/patches" --jq '.[].name')

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Compute scripts hash (for cache key)
        id: hash
        run: |
          HASH=$(find proton-scripts -type f | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          echo "scripts_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "scripts_hash: $HASH"

      - name: Commit updated proton-scripts
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proton-scripts/
          git diff --staged --quiet || {
            git commit -m "chore: sync proton-scripts from Pepelespooder upstream"
            git pull --rebase origin HEAD
            git push
          }

  # ============================================================
  # JOB 2: Build Proton ARM64EC
  # ============================================================
  build:
    needs: sync-scripts
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_id: arm64ec
            termux_arch: aarch64
            build_script: build-step-arm64ec.sh
            output_dir: compiled-files-aarch64
            prefix_pack: prefixPack-arm64ec.txz
            profile_version: 10.0.99-arm64ec
            display_arch: ARM64EC
            sysvshm: true

    steps:
      - name: Checkout Nightlies repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up build environment
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            curl \
            unzip \
            flex \
            bison \
            gettext \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64 \
            gcc-multilib \
            g++-multilib \
            libfreetype6-dev \
            libfreetype6-dev:i386 \
            libpng-dev \
            libpng-dev:i386 \
            zlib1g-dev \
            zlib1g-dev:i386 \
            zstd \
            xz-utils \
            python3-zstandard \
            patch

      - name: Clone Wine source
        run: |
          WINE_REF="${{ github.event.inputs.wine_ref || 'bleeding-edge' }}"
          git clone --depth=1 --branch "$WINE_REF" \
            https://github.com/ValveSoftware/wine wine-source \
          || {
            git clone --depth=1 https://github.com/ValveSoftware/wine wine-source
            git -C wine-source fetch --depth=1 origin "$WINE_REF"
            git -C wine-source checkout FETCH_HEAD
          }
          echo "Wine ref: $WINE_REF"
          git -C wine-source rev-parse HEAD

      - name: Clone GameNative patches and build scripts
        run: |
          GN_REF="${{ github.event.inputs.gamenative_ref || 'proton_10.0' }}"
          git clone --depth=1 --branch "$GN_REF" \
            https://github.com/GameNative/proton-wine gamenative-src \
          || {
            git clone --depth=1 https://github.com/GameNative/proton-wine gamenative-src
            git -C gamenative-src fetch --depth=1 origin "$GN_REF"
            git -C gamenative-src checkout FETCH_HEAD
          }
          cp -r gamenative-src/android       wine-source/android
          cp -r gamenative-src/build-scripts wine-source/build-scripts
          rm -rf gamenative-src

      - name: Apply patches and fix scripts
        run: |
          SCRIPTS="$GITHUB_WORKSPACE/proton-scripts/scripts"
          GE="$GITHUB_WORKSPACE/proton-scripts/ge-second-pass"

          # Apply repo-owned BYLAWS patch overrides
          rm -f wine-source/android/patches/dlls_wow64_syscall_c.patch
          rm -f wine-source/android/patches/test-bylaws/dlls_wow64_syscall_c.patch
          rm -f wine-source/android/patches/test-bylaws/dlls_ntdll_signal_arm64ec_c.patch
          mkdir -p wine-source/android/patches/test-bylaws
          cp "$GE/test-bylaws/dlls_wow64_syscall_c.patch" \
            wine-source/android/patches/dlls_wow64_syscall_c.patch
          cp "$GE/test-bylaws/dlls_wow64_syscall_c.patch" \
            wine-source/android/patches/test-bylaws/dlls_wow64_syscall_c.patch
          cp "$GE/test-bylaws/dlls_ntdll_signal_arm64ec_c.patch" \
            wine-source/android/patches/test-bylaws/dlls_ntdll_signal_arm64ec_c.patch

          find wine-source/android/patches -type f -name "*.patch" -exec sed -i 's/\r$//' {} +
          sed -i 's/atoi("WINE_X11FORCEGLX")/atoi(getenv("WINE_X11FORCEGLX"))/g' \
            wine-source/android/patches/dlls_winex11_drv_opengl_c.patch

          python3 "$SCRIPTS/filter_patches.py"    wine-source/build-scripts/build-step-arm64ec.sh wine-source
          python3 "$SCRIPTS/patch_build_script.py" wine-source/build-scripts/build-step-arm64ec.sh

          python3 "$SCRIPTS/fix_window_c.py"      wine-source
          python3 "$SCRIPTS/fix_wineboot_c.py"    wine-source
          python3 "$SCRIPTS/fix_wdscore.py"        wine-source
          python3 "$SCRIPTS/fix_virtual_c.py"      wine-source
          python3 "$SCRIPTS/fix_fsync.py"          wine-source
          python3 "$SCRIPTS/fix_suspend_chain.py"  wine-source
          python3 "$SCRIPTS/fix_test_bylaws_chain.py" wine-source

          TARGET_APP_ID="${{ github.event.inputs.target_app_id || 'app.gamenative' }}"
          PROFILE_VERSION="${{ matrix.profile_version }}"
          INSTALL_DIR="/data/data/${TARGET_APP_ID}/files/imagefs/opt/proton-${PROFILE_VERSION}"
          RUNTIME_PATH="/data/data/${TARGET_APP_ID}/files/imagefs/usr"
          sed -i "s|export install_dir=.*|export install_dir=${INSTALL_DIR}|" \
            "wine-source/build-scripts/${{ matrix.build_script }}"
          sed -i "s|export RUNTIME_PATH=.*|export RUNTIME_PATH=\"${RUNTIME_PATH}\"|" \
            "wine-source/build-scripts/${{ matrix.build_script }}"

      - name: Download termuxfs (${{ matrix.termux_arch }})
        run: |
          TERMUX_DIR="$HOME/termuxfs/${{ matrix.termux_arch }}"
          mkdir -p "$TERMUX_DIR"
          cd "$TERMUX_DIR"
          wget -q "https://github.com/GameNative/termux-on-gha/releases/download/build-20260218/termuxfs-${{ matrix.termux_arch }}.tar"
          tar -xf "termuxfs-${{ matrix.termux_arch }}.tar"
          rm -f "termuxfs-${{ matrix.termux_arch }}.tar"

      - name: Set up Android NDK r27d
        run: |
          NDK_DIR="$HOME/Android/Sdk/ndk/27.3.13750724"
          if [ ! -d "$NDK_DIR" ]; then
            mkdir -p "$HOME/Android/Sdk/ndk"
            cd "$HOME/Android/Sdk/ndk"
            wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
            unzip -q android-ndk-r27d-linux.zip
            mv android-ndk-r27d 27.3.13750724
          fi

      - name: Set up LLVM MinGW (bylaws 20250920)
        run: |
          LLVM_DIR="$HOME/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64"
          if [ ! -f "$LLVM_DIR/bin/llvm-dlltool" ]; then
            mkdir -p "$HOME/toolchains"
            cd "$HOME/toolchains"
            wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
            tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          fi
          echo "$HOME/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Run autogen.sh
        run: |
          cd wine-source
          bash autogen.sh

      - name: Cache wine-tools
        id: cache-wine-tools
        uses: actions/cache@v4
        with:
          path: wine-source/wine-tools
          key: proton-wine-tools-${{ matrix.arch_id }}-${{ hashFiles('wine-source/configure.ac', 'wine-source/configure') }}
          restore-keys: proton-wine-tools-${{ matrix.arch_id }}-

      - name: Build wine-tools
        if: steps.cache-wine-tools.outputs.cache-hit != 'true'
        run: |
          cd wine-source
          mkdir -p wine-tools
          cd wine-tools
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland --without-xinput2
          make -j$(nproc) __tooldeps__ nls/all

      - name: Build sysvshm library
        if: matrix.sysvshm
        run: |
          cd wine-source
          bash "build-scripts/${{ matrix.build_script }}" --build-sysvshm

      - name: Configure build
        id: configure_build
        continue-on-error: true
        run: |
          cd wine-source
          bash "build-scripts/${{ matrix.build_script }}" --configure
          test -f Makefile

      - name: Dump configure logs on failure
        if: steps.configure_build.outcome == 'failure'
        run: |
          echo "ERROR: configure failed"
          find wine-source -maxdepth 2 \( -name config.log -o -name configure.log \) -print | \
            xargs -I{} sh -c 'echo "=== {} ===" && tail -n 200 {}'
          exit 1

      - name: Verify patch markers
        run: |
          python3 proton-scripts/scripts/verify_required_markers.py wine-source

      - name: Build Proton
        run: |
          cd wine-source
          bash "build-scripts/${{ matrix.build_script }}" --build

      - name: Install Proton
        run: |
          TARGET_APP_ID="${{ github.event.inputs.target_app_id || 'app.gamenative' }}"
          PROFILE_VERSION="${{ matrix.profile_version }}"
          sudo mkdir -p "/data/data/${TARGET_APP_ID}/files/imagefs/opt/proton-${PROFILE_VERSION}"
          sudo chmod -R 777 /data/data

          cd wine-source
          bash "build-scripts/${{ matrix.build_script }}" --install

          OUTPUT_DIR="$HOME/${{ matrix.output_dir }}"
          echo "=== Ensuring core D3D DLLs are staged ==="
          ensure_d3d_dll() {
            local arch_dir="$1" dll_name="$2"
            local dst="$OUTPUT_DIR/lib/wine/$arch_dir/$dll_name"
            [ -f "$dst" ] && { echo "present: $dst"; return; }
            local src
            src="$(find "$PWD" -type f \( -name "$dll_name" -o -name "$dll_name.so" \) \
              | grep "/$arch_dir/" | head -n1 || true)"
            if [ -n "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp -f "$src" "$dst"
              echo "staged: $src -> $dst"
            else
              echo "missing: $dll_name for $arch_dir"
            fi
          }
          for arch_dir in aarch64-windows i386-windows; do
            ensure_d3d_dll "$arch_dir" d3d8.dll
            ensure_d3d_dll "$arch_dir" d3d8thk.dll
            ensure_d3d_dll "$arch_dir" d3d9.dll
            ensure_d3d_dll "$arch_dir" wined3d.dll
          done

      - name: Download prefixPack.txz
        run: |
          wget -q "https://github.com/GameNative/bionic-prefix-files/raw/main/${{ matrix.prefix_pack }}" \
            -O "$HOME/${{ matrix.output_dir }}/prefixPack.txz"

      - name: Package WCP and WCP.XZ
        run: |
          OUTPUT_DIR="$HOME/${{ matrix.output_dir }}"
          SCRIPTS="$GITHUB_WORKSPACE/proton-scripts/scripts"
          GIT_HASH=$(git -C wine-source rev-parse --short HEAD)
          GIT_DATE=$(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')
          VERSION="proton-bleeding-edge-${GIT_DATE}-${GIT_HASH}-${{ matrix.arch_id }}"
          DISPLAY_NAME="Proton bleeding-edge ${{ matrix.display_arch }} ${GIT_DATE} (${GIT_HASH})"
          PROFILE_VERSION="${{ matrix.profile_version }}"

          mkdir -p "$GITHUB_WORKSPACE/output"

          # Generate profile.json for .wcp (proton variant)
          python3 "$SCRIPTS/generate_profile.py" \
            "${OUTPUT_DIR}/profile.json" \
            "${PROFILE_VERSION}" \
            "1" \
            "${DISPLAY_NAME}"

          # Create .wcp
          bash "$SCRIPTS/create-proton-wcp.sh" \
            "$OUTPUT_DIR" \
            "$GITHUB_WORKSPACE/output/proton-${VERSION}.wcp" \
            "${PROFILE_VERSION}" \
            "1" \
            "${DISPLAY_NAME}"

          # Generate profile.json for .wcp.xz (wine variant)
          python3 "$SCRIPTS/generate_profile.py" \
            "${OUTPUT_DIR}/profile.json" \
            "${PROFILE_VERSION}" \
            "0" \
            "${DISPLAY_NAME}" \
            wine

          # Create .wcp.xz
          cd "$OUTPUT_DIR"
          tar cJf "$GITHUB_WORKSPACE/output/proton-wine-${VERSION}.wcp.xz" \
            bin lib share prefixPack.txz profile.json

          cd "$GITHUB_WORKSPACE"

          # SHA256 checksums
          sha256sum "output/proton-${VERSION}.wcp" \
            > "output/proton-${VERSION}.wcp.sha256"
          sha256sum "output/proton-wine-${VERSION}.wcp.xz" \
            > "output/proton-wine-${VERSION}.wcp.xz.sha256"

          WCP_SHA=$(cut -d' ' -f1 "output/proton-${VERSION}.wcp.sha256")
          WCPXZ_SHA=$(cut -d' ' -f1 "output/proton-wine-${VERSION}.wcp.xz.sha256")

          cat > "output/metadata-${{ matrix.arch_id }}.json" <<EOF
          {
            "arch": "${{ matrix.arch_id }}",
            "gitHash": "${GIT_HASH}",
            "gitDate": "${GIT_DATE}",
            "version": "${VERSION}",
            "profileVersion": "${PROFILE_VERSION}",
            "wcpFile": "proton-${VERSION}.wcp",
            "wcpSha": "${WCP_SHA}",
            "wcpxzFile": "proton-wine-${VERSION}.wcp.xz",
            "wcpxzSha": "${WCPXZ_SHA}"
          }
          EOF

          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proton-bleeding-edge-${{ matrix.arch_id }}
          path: output/
          retention-days: 7

  # ============================================================
  # JOB 3: Publish GitHub Release
  # ============================================================
  release:
    needs: [sync-scripts, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Nightlies repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read build metadata
        id: meta
        run: |
          python3 <<'PY'
          import glob, json, os
          from pathlib import Path

          metas = {}
          for path in glob.glob("artifacts/**/metadata-*.json", recursive=True):
              data = json.loads(Path(path).read_text())
              metas[data["arch"]] = data

          if "arm64ec" not in metas:
              raise SystemExit("missing metadata for arm64ec")

          arm = metas["arm64ec"]
          run_suffix = os.environ["GITHUB_RUN_NUMBER"]
          release_tag = f"proton-bleeding-edge-{arm['gitDate']}-{arm['gitHash']}-run{run_suffix}"

          outputs = {
              "git_hash":    arm["gitHash"],
              "git_date":    arm["gitDate"],
              "release_tag": release_tag,
          }
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              for k, v in outputs.items():
                  fh.write(f"{k}={v}\n")
          PY

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.wcp"            -exec cp {} release/ \;
          find artifacts -name "*.wcp.xz"         -exec cp {} release/ \;
          find artifacts -name "*.wcp.sha256"     -exec cp {} release/ \;
          find artifacts -name "*.wcp.xz.sha256"  -exec cp {} release/ \;
          ls -lah release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_HASH: ${{ steps.meta.outputs.git_hash }}
          GIT_DATE: ${{ steps.meta.outputs.git_date }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          python3 <<'PY'
          import json, os, glob, datetime, urllib.request

          git_hash    = os.environ["GIT_HASH"]
          git_date    = os.environ["GIT_DATE"]
          tag         = os.environ["RELEASE_TAG"]
          gh_token    = os.environ["GH_TOKEN"]

          def gh_api(path):
              req = urllib.request.Request(
                  f"https://api.github.com/{path}",
                  headers={"Authorization": f"Bearer {gh_token}",
                           "Accept": "application/vnd.github+json"})
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"WARNING: API call failed ({path}): {e}")
                  return {}

          # Old hash from proton-latest.json (before update)
          try:
              old_hash = json.loads(open("proton-latest.json").read()).get("gitHash", "")
          except Exception:
              old_hash = ""
          old_short = old_hash[:7] if old_hash else ""

          # Wine bleeding-edge current HEAD + commit info
          branch_info  = gh_api("repos/ValveSoftware/wine/branches/bleeding-edge")
          wine_full    = branch_info.get("commit", {}).get("sha", "") or git_hash
          wine_short   = wine_full[:7]

          commit_info  = gh_api(f"repos/ValveSoftware/wine/commits/{wine_full}")
          wine_msg     = (commit_info.get("commit", {}).get("message", "N/A") or "N/A").split("\n")[0][:80]
          wine_ts_str  = commit_info.get("commit", {}).get("committer", {}).get("date", "")
          wine_date_d  = wine_ts_str[:10] if wine_ts_str else "unknown"

          # 🆕 badge — updated in last 24h
          new_badge = ""
          if wine_ts_str:
              try:
                  dt = datetime.datetime.fromisoformat(wine_ts_str.replace("Z", "+00:00"))
                  if (datetime.datetime.now(datetime.timezone.utc) - dt).total_seconds() < 86400:
                      new_badge = " 🆕"
              except Exception:
                  pass

          # What triggered
          if old_short and old_short != wine_short:
              triggered = (
                  "### 🔄 What Triggered This Build\n"
                  "> Wine bleeding-edge was updated\n\n"
                  "| Component | Old Commit | New Commit | Change |\n"
                  "| :--- | :--- | :--- | :--- |\n"
                  f"| **ValveSoftware/wine** `bleeding-edge` | `{old_short}` "
                  f"| [`{wine_short}`](https://github.com/ValveSoftware/wine/commit/{wine_full}) "
                  f"| {wine_msg} |\n\n---"
              )
          else:
              triggered = (
                  "### 🔄 What Triggered This Build\n"
                  "> Scheduled build or manual dispatch\n\n---"
              )

          # File names from release/
          wcp_files  = [f for f in glob.glob("release/*.wcp") if not f.endswith(".xz")]
          wcpxz_files = glob.glob("release/*.wcp.xz")
          wcp_name   = os.path.basename(wcp_files[0])   if wcp_files   else "proton-*.wcp"
          wcpxz_name = os.path.basename(wcpxz_files[0]) if wcpxz_files else "proton-wine-*.wcp.xz"

          lines = [
              "> ⚠️ **DISCLAIMER: BLEEDING-EDGE BUILDS ARE NOT ALWAYS STABLE OR RECOMMENDED! USE AT YOUR OWN RISK!**",
              "",
              "---",
              "",
              f"### 🚀 Proton Bleeding-Edge Build: {tag}",
              "",
              triggered,
              "",
              "",
              "### 📊 Upstream Status",
              "| Component | Latest Commit | Last Updated |",
              "| :--- | :--- | :--- |",
              f"| **ValveSoftware/wine** `bleeding-edge` | [`{wine_short}` — {wine_msg}](https://github.com/ValveSoftware/wine/commit/{wine_full}) | {wine_date_d}{new_badge} |",
              "",
              "",
              "---",
              "",
              "### 📦 Built Components",
              "",
              "| Component | Source / Commit |",
              "| :--- | :--- |",
              f"| **Proton ARM64EC** | [ValveSoftware/wine `bleeding-edge` @ `{wine_short}`](https://github.com/ValveSoftware/wine/commit/{wine_full}) |",
              "",
              "### 📦 Files Included",
              f"1. **Proton WCP**: `{wcp_name}` (and `{wcp_name}.sha256`)",
              f"2. **Proton WCP.XZ**: `{wcpxz_name}` (and `{wcpxz_name}.sha256`)",
              "",
              "**The .wcp file is packaged for direct injection via BannersComponentInjector into GameHub/Winlator**",
              "**The .wcp.xz file is an XZ-compressed tar archive (bin/lib/share + prefixPack) for manual use or Winlator**",
          ]
          notes = "\n".join(lines)
          with open("/tmp/release-notes.md", "w") as f:
              f.write(notes)
          print("Release notes written.")
          PY

          gh release create "$RELEASE_TAG" release/* \
            --title "Proton bleeding-edge ARM64EC ($GIT_DATE)" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
          || gh release upload "$RELEASE_TAG" release/* --clobber

      - name: Update proton-latest.json
        run: |
          python3 <<'PY'
          import glob, json
          from pathlib import Path

          metas = {}
          for path in glob.glob("artifacts/**/metadata-*.json", recursive=True):
              data = json.loads(Path(path).read_text())
              metas[data["arch"]] = data

          arm = metas["arm64ec"]
          data = {
              "gitHash":     arm["gitHash"],
              "date":        arm["gitDate"],
              "versionName": arm["version"],
              "wcp":   { "fileName": arm["wcpFile"],  "sha256": arm["wcpSha"]   },
              "wcpxz": { "fileName": arm["wcpxzFile"], "sha256": arm["wcpxzSha"] },
              "releaseTag": "${{ steps.meta.outputs.release_tag }}",
          }
          Path("proton-latest.json").write_text(json.dumps(data, indent=2) + "\n")
          print(json.dumps(data, indent=2))
          PY

      - name: Commit proton-latest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proton-latest.json
          GIT_DATE="${{ steps.meta.outputs.git_date }}"
          git diff --staged --quiet || git commit -m "chore: update proton-latest.json for bleeding-edge ${GIT_DATE}"
          git pull --rebase origin HEAD
          git push

